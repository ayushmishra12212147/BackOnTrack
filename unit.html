<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Unit topics and practice — BackOntrack." />
    <title>Unit — BackOntrack</title>
    <link rel="stylesheet" href="css/variables.css" />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/components.css" />
    <link rel="stylesheet" href="css/pages.css" />
    <link id="prism-theme" rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism.min.css" crossorigin="anonymous" />
  </head>
  <body>
    <a class="skip-link" href="#main-content">Skip to content</a>
    <header class="site-header">
      <div class="container header-inner">
        <a class="logo" href="index.html">Back<span>Ontrack</span></a>
        <div class="header-actions">
          <div class="search-wrap" role="search">
            <label for="global-search" class="visually-hidden">Search subjects and topics</label>
            <input type="search" id="global-search" class="search-input" placeholder="Search subjects & topics…" autocomplete="off" />
            <div id="search-results" class="search-results" hidden></div>
          </div>
          <button type="button" class="btn-icon theme-toggle" id="theme-toggle" aria-label="Toggle dark mode" title="Theme"></button>
        </div>
      </div>
    </header>

    <main id="main-content" class="main">
      <div class="container">
        <nav class="breadcrumb" id="breadcrumb" aria-label="Breadcrumb"></nav>
        <div id="loading-page" class="loading-state">
          <span class="spinner" aria-hidden="true"></span>
          <span>Loading unit…</span>
        </div>
        <article id="page-content" class="unit-article" hidden>
          <header class="unit-header">
            <h1 id="unit-title"></h1>
            <p id="unit-summary" class="muted"></p>
          </header>
          <section class="section-block" aria-labelledby="topics-heading">
            <h2 id="topics-heading">Topics in this unit</h2>
            <ul id="topic-list" class="topic-list"></ul>
          </section>
          <section class="section-block practice-section" aria-labelledby="practice-heading">
            <h2 id="practice-heading">Practice</h2>
            <p class="muted">Complete these after you finish the topics above.</p>
            <div id="practice-mcqs" class="practice-block"></div>
            <div id="practice-theory" class="practice-block"></div>
            <div id="practice-coding" class="practice-block"></div>
          </section>
        </article>
        <p id="page-error" class="error-msg" hidden></p>
      </div>
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <p>© <span id="year"></span> BackOntrack.</p>
      </div>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-c.min.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-java.min.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-sql.min.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js" crossorigin="anonymous"></script>
    <script type="module" src="js/theme.js"></script>
    <script type="module" src="js/search.js"></script>
    <script type="module" src="js/pages/unit.js"></script>
  </body>
</html>
